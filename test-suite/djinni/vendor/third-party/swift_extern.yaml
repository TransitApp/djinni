# Extern types for testing Swift code generation
# Tests: custom typename, module import, and skip behavior

---
name: swift_color_type
typedef: 'record'
params: []
prefix: ''
cpp:
  typename: 'TestColor'
  header: '"TestColor.h"'
  byValue: false
objc:
  typename: 'UIColor'
  header: '<UIKit/UIKit.h>'
  boxed: 'UIColor'
  pointer: true
  hash: '%s.hash'
objcpp:
  translator: '::djinni::TestColorTranslator'
  header: '"TestColorTranslator.h"'
java:
  typename: 'android.graphics.Color'
  boxed: 'android.graphics.Color'
  reference: true
  generic: false
  hash: '%s.hashCode()'
jni:
  translator: '::djinni::TestColorJni'
  header: '"TestColorJni.h"'
  typename: jobject
  typeSignature: 'Landroid/graphics/Color;'
swift:
  typename: 'UIColor'
  module: 'UIKit'

